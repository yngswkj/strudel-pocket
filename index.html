<!DOCTYPE html>
<!-- lang="en": iOS/Androidはページ言語からソフトキーボードの初期言語を推測するため、
     日本語キーボードが出るのを避ける目的で意図的にenにしている(UI文言は日本語のまま) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Strudel Pocket">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<title>Strudel Pocket</title>
<!-- Strudel core (web bundle). CDNから読み込むためオフラインでは動きません -->
<script id="strudel-lib" src="https://unpkg.com/@strudel/web@1.3.0"></script>
<style>
  :root{
    --bg:#0e1116;
    --surface:#171c26;
    --surface2:#1f2634;
    --line:#28303f;
    --text:#e7eaf2;
    --muted:#8b93a7;
    --hot:#ff7a45;   /* 再生・アクション */
    --cool:#3fd6c0;  /* フェーダー・準備OK */
    --warn:#ff5470;  /* エラー */
    --visual-bg:rgba(0,0,0,.3);
    --visual-glow:rgba(63,214,192,.22);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    --dock-height:148px;
    --keyboard-inset:0px;
    --editor-dock-gap:28px;
  }
  /* ── テーマ(本家 green-text / archBtw の配色を移植) ── */
  :root[data-theme="greenText"]{
    --bg:#000000;--surface:#0a0f08;--surface2:#111a0d;--line:#1e2b18;
    --text:#56bd2a;--muted:#54636d;--hot:#8ed675;--cool:#56bd2a;
    --visual-bg:rgba(3,18,0,.7);--visual-glow:rgba(86,189,42,.28);
  }
  :root[data-theme="archBtw"]{
    --bg:#000000;--surface:#050d13;--surface2:#0a161e;--line:#12293a;
    --text:#52d0fa;--muted:rgba(113,208,250,.4);--hot:#52d0fa;--cool:#52d0fa;
    --visual-bg:rgba(0,14,24,.72);--visual-glow:rgba(82,208,250,.28);
  }
  /* Strudelの視覚化(.pianoroll()等)が作る全画面キャンバスをエディタの背面に敷く。
     ヘッダーとドックは不透明なので、エディタ領域だけ透けて見える */
  #test-canvas{z-index:-1}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;width:100%;overflow:hidden}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:var(--sans);
    overscroll-behavior:none;
    display:flex;flex-direction:column;
    height:100dvh;
  }
  button{
    font-family:inherit;touch-action:manipulation;cursor:pointer;border:none;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none; /* 長押しでの選択メニュー抑止 */
  }

  /* ── ヘッダー ─────────────────────── */
  header{
    display:flex;align-items:center;gap:10px;
    padding:8px 12px calc(8px) 14px;
    padding-top:calc(8px + env(safe-area-inset-top));
    background:var(--surface);border-bottom:1px solid var(--line);
    flex:0 0 auto;min-width:0;overflow:hidden;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:0 0 auto;transition:background .3s}
  .dot.ready{background:var(--cool)}
  .dot.playing{background:var(--hot)}
  @media (prefers-reduced-motion: no-preference){
    .dot.playing{animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.35}}
  }
  .dot.error{background:var(--warn)}
  .brand{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.04em}
  .brand small{color:var(--muted);font-weight:400;margin-left:6px;font-size:11px}
  #status{font-size:11px;color:var(--muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbtn{
    background:var(--surface2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;height:34px;padding:0 10px;font-size:12px;flex:0 0 auto;
  }
  .hbtn:active:not(:disabled){background:var(--line)}
  .hbtn:disabled{opacity:.35}

  /* ヘッダー内の横スクロールボタン群(↶↷が見え、スクロールするとA−/A＋が現れる) */
  #hscroll{
    display:flex;gap:6px;flex:0 0 auto;width:82px;overflow-x:auto;
    scrollbar-width:none;scroll-snap-type:x mandatory;
    margin-left:auto; /* ロゴ以外のボタン群を右寄せする */
  }
  #hscroll::-webkit-scrollbar{display:none}
  #hscroll .hbtn{
    scroll-snap-align:start;font-size:14px;
    touch-action:pan-x; /* ボタン上からでも横スワイプでスクロールできる */
  }

  /* 狭い画面(スマホ縦)ではヘッダーを詰める */
  @media (max-width:430px){
    header{gap:8px;padding-left:12px;padding-right:10px}
    .brand small{display:none}
    #status{display:none}
  }

  @media (max-width:340px){
    header{gap:6px;padding-left:8px;padding-right:8px}
    .brand{font-size:13px}
    #hscroll{width:70px}
    #openDrawer{padding:0 8px;font-size:11px}
  }

  /* ── エディタ ─────────────────────── */
  #ed{
    flex:1;min-height:0;width:100%;resize:none;border:none;outline:none;
    background:transparent;color:var(--text); /* 透明: 背面の視覚化キャンバスを見せる */
    font-family:var(--mono);font-size:16px;line-height:1.55;
    padding:14px 14px calc(var(--dock-height) + var(--keyboard-inset) + var(--editor-dock-gap));
    scroll-padding-bottom:calc(var(--dock-height) + var(--keyboard-inset) + var(--editor-dock-gap));
    overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    caret-color:var(--hot);
  }
  #ed::selection{background:rgba(63,214,192,.28)}

  /* ── 下部ドック ───────────────────── */
  #dock{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:var(--surface);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
    will-change:transform;max-width:100vw;overflow:hidden;
  }
  /* 視覚化エリア(.pianoroll()/.scope()の描画先。ドック上段=コードの下) */
  #visuals{display:none;gap:6px;padding:6px 10px 0;height:120px}
  #visuals.show{display:flex}
  #visuals canvas{
    flex:1;min-width:0;height:100%;border-radius:10px;
    background:
      linear-gradient(180deg,var(--visual-glow),transparent 42%),
      var(--visual-bg);
    border:1px solid var(--cool);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.02), 0 0 14px var(--visual-glow);
  }
  #activeNoteOverlay{position:fixed;inset:0;z-index:9;pointer-events:none;overflow:hidden}
  .activeNoteBox{
    position:fixed;border:1.5px solid var(--hot);border-radius:4px;
    background:color-mix(in srgb,var(--hot) 14%,transparent);
    box-shadow:0 0 8px var(--hot);
  }

  #errbar{
    display:none;padding:6px 12px;font-size:12px;
    font-family:var(--mono);color:var(--warn);
    background:rgba(255,84,112,.1);border-bottom:1px solid rgba(255,84,112,.3);
    white-space:nowrap;overflow-x:auto;
  }
  #errbar.show{display:block}

  /* 数値フェーダー(シグネチャ要素) */
  #scrub{
    display:none;align-items:center;gap:8px;
    padding:8px 12px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(63,214,192,.07),transparent);
  }
  #scrub.show{display:flex}
  #scrubVal{
    font-family:var(--mono);font-size:15px;font-weight:700;color:var(--cool);
    min-width:64px;text-align:right;
  }
  .step{
    width:38px;height:38px;border-radius:10px;flex:0 0 auto;
    background:var(--surface2);border:1px solid var(--line);color:var(--cool);
    font-size:18px;font-weight:700;line-height:1;
  }
  .step:active{background:var(--line)}
  #fader{
    flex:1;appearance:none;-webkit-appearance:none;height:38px;background:transparent;min-width:0;
  }
  #fader::-webkit-slider-runnable-track{
    height:6px;border-radius:3px;
    background:repeating-linear-gradient(90deg,var(--line) 0 2px,transparent 2px 12%),var(--surface2);
  }
  #fader::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:30px;margin-top:-12px;
    border-radius:6px;background:var(--cool);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.35), 0 2px 8px rgba(63,214,192,.4);
  }

  /* 作曲モード + 編集操作(カーソル移動・undo/redo) + 関数チップ */
  #modes{
    display:flex;gap:6px;padding:8px 10px 0;overflow-x:auto;
    scrollbar-width:none;
  }
  #modes::-webkit-scrollbar{display:none}
  .modeBtn{
    flex:1 0 54px;height:32px;border-radius:8px;
    background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:12px;font-weight:700;
  }
  .modeBtn.active{
    background:rgba(63,214,192,.11);border-color:var(--cool);color:var(--cool);
  }
  .modeBtn:active{background:var(--line)}
  #editrow{display:flex;gap:6px;align-items:stretch;padding:8px 10px 2px}
  .ekey{
    width:36px;border-radius:9px;flex:0 0 auto;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    font-family:var(--mono);font-size:15px;
  }
  .ekey:disabled{opacity:.35}
  .ekey:active:not(:disabled){background:var(--line)}
  #chips{
    display:flex;gap:6px;overflow-x:auto;flex:1;min-width:0;
    scrollbar-width:none;
  }
  #chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;background:var(--surface2);border:1px solid var(--line);
    color:var(--text);border-radius:999px;padding:9px 14px;
    font-family:var(--mono);font-size:13px;
    touch-action:pan-x; /* 横スクロールを許可(スクロール開始でpointercancelが発火) */
  }
  .chip:active{background:var(--line)}

  /* 記号キー */
  #keys{display:flex;gap:5px;padding:6px 10px}
  .key{
    flex:1;height:44px;border-radius:9px;min-width:0;padding:0;
    background:var(--surface2);border:1px solid var(--line);
    color:var(--text);font-family:var(--mono);font-size:16px;
    display:flex;align-items:center;justify-content:center;
    white-space:nowrap; /* "[ ]"等のスペース入りラベルが縦2段に折り返すのを防ぐ */
  }
  .key:active{background:var(--line)}
  @media (max-width:430px){
    #modes{gap:5px;padding-left:8px;padding-right:8px}
    .modeBtn{flex-basis:50px;font-size:11px}
    #keys{gap:4px;padding:6px 8px}
    .key{font-size:13px}
  }

  /* トランスポート(ヘッダー内)。再生/停止のトグル1個に集約 */
  #playBtn{
    width:64px;height:36px;border-radius:10px;font-size:16px;font-weight:700;
    background:var(--hot);color:#1a0e07;flex:0 0 auto;
    transition:background .15s,color .15s;
  }
  #playBtn.playing{background:var(--cool);color:#062a25}
  #playBtn:active{filter:brightness(1.12)}

  /* ヘッダーの小型ボタン(A−/A＋は文字幅差が出ないよう固定幅) */
  .hbtn.compact{width:38px;padding:0;font-size:12px;text-align:center}
  @media (max-width:430px){#playBtn{width:60px}}
  @media (max-width:340px){#playBtn{width:52px}}

  /* ── パターン集ドロワー ─────────────── */
  #drawer{
    position:fixed;inset:0;z-index:50;display:none;
    background:rgba(10,12,17,.72);backdrop-filter:blur(3px);
  }
  #drawer.show{display:block}
  #sheet{
    position:absolute;left:0;right:0;bottom:0;height:min(82%,760px);
    display:flex;flex-direction:column;
    background:var(--surface);border-radius:18px 18px 0 0;
    border-top:1px solid var(--line);
    overflow:hidden;
  }
  /* シート上部(つまみ+タブ)は固定。つまみ部分の下スワイプで閉じられる */
  #sheetHead{
    flex:0 0 auto;padding:8px 14px 10px;border-bottom:1px solid var(--line);
    touch-action:none;
  }
  #sheetGrip{width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 10px}
  #sheetTabs{display:flex;gap:6px;align-items:center}
  .sheetTab{
    flex:1;height:38px;border-radius:9px;font-size:12px;font-weight:700;min-width:0;
    background:transparent;border:1px solid var(--line);color:var(--muted);
    white-space:nowrap;
  }
  .sheetTab.active{background:rgba(63,214,192,.11);border-color:var(--cool);color:var(--cool)}
  .sheetTab:active{background:var(--line)}
  #closeDrawer{
    width:38px;height:38px;border-radius:9px;flex:0 0 auto;
    background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-size:14px;
  }
  #sheetBody{
    flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain;
    padding:14px 14px calc(20px + env(safe-area-inset-bottom));
  }
  .dsec{display:none}
  .dsec.show{display:block}
  #sheet h2{font-size:15px;margin:2px 4px 12px;font-weight:700}
  #themes{display:flex;gap:8px;margin:0 2px 18px}
  .themeBtn{
    flex:1;height:44px;border-radius:10px;font-size:13px;font-family:var(--mono);
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
  }
  .themeBtn.active{border-color:var(--cool);color:var(--cool)}
  #playSettings{display:grid;gap:10px;margin:0 2px 18px}
  .settingToggle{
    display:flex;align-items:center;gap:10px;min-height:42px;
    padding:0 12px;border-radius:10px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    font-size:13px;font-weight:700;
  }
  .settingToggle input{width:20px;height:20px;accent-color:var(--cool)}
  .settingRange{
    display:grid;gap:8px;padding:10px 12px;border-radius:10px;
    background:var(--surface2);border:1px solid var(--line);
  }
  .settingRange label{
    display:flex;justify-content:space-between;gap:12px;
    font-size:13px;font-weight:700;color:var(--text);
  }
  .settingRange span{font-family:var(--mono);color:var(--cool)}
  .settingRange input{width:100%;accent-color:var(--cool)}
  #soundStatus{font-size:12px;color:var(--muted);margin:0 4px 10px}
  /* サウンド検索(スマホ前提: 大きめのタップ領域と横スクロールのフィルタ) */
  #soundSearch{
    width:100%;height:44px;border-radius:10px;padding:0 12px;margin:0 0 8px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    font:14px var(--mono);
  }
  #soundSearch::placeholder{color:var(--muted)}
  #soundFilters{display:flex;gap:6px;margin:0 0 10px;overflow-x:auto;scrollbar-width:none}
  #soundFilters::-webkit-scrollbar{display:none}
  .soundFilterBtn{
    flex:0 0 auto;height:34px;border-radius:999px;padding:0 14px;font-size:12px;font-weight:700;
    background:transparent;border:1px solid var(--line);color:var(--muted);
  }
  .soundFilterBtn.active{background:rgba(63,214,192,.11);border-color:var(--cool);color:var(--cool)}
  #soundResults{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 18px}
  .soundResult{
    flex:0 0 auto;max-width:100%;border-radius:9px;padding:9px 11px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    font-family:var(--mono);font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .soundResult:active{background:var(--line)}
  .soundResult small{color:var(--muted);font-size:10px;margin-left:4px}
  .soundResultsInfo{width:100%;font-size:11px;color:var(--muted);padding:0 2px}
  .soundMore{
    width:100%;height:42px;border-radius:10px;font-size:13px;font-weight:700;
    background:var(--surface2);border:1px solid var(--line);color:var(--cool);
  }
  .soundMore:active{background:var(--line)}
  #soundHint{margin:0 0 8px}
  #drawer.soundDragging{
    pointer-events:none;background:transparent;backdrop-filter:none;
  }
  #drawer.soundDragging #sheet{
    transform:translateY(calc(100% + 24px));transition:transform .16s ease;
  }
  #ed.soundDropTarget{outline:2px solid var(--cool);outline-offset:-4px}
  .soundDragGhost{
    position:fixed;z-index:70;pointer-events:none;transform:translate(-50%,-150%);
    max-width:70vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    padding:9px 13px;border-radius:10px;
    background:var(--cool);color:#062a25;
    font:700 13px var(--mono);box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .soundDragGhost.cancel{opacity:.35;background:var(--surface2);color:var(--muted)}
  .soundDropCaret{
    position:fixed;z-index:69;pointer-events:none;width:2px;
    background:var(--hot);border-radius:1px;box-shadow:0 0 6px var(--hot);
  }
  #soundPasteBar{
    position:fixed;left:10px;right:10px;
    bottom:calc(var(--dock-height, 148px) + var(--keyboard-inset, 0px) + 8px);
    z-index:45;display:flex;align-items:center;gap:8px;
    min-height:46px;padding:6px 6px 6px 12px;border-radius:10px;
    background:var(--surface);border:1px solid var(--cool);
    box-shadow:0 8px 24px rgba(0,0,0,.42);
  }
  #soundPasteBar[hidden]{display:none}
  #soundPasteText{
    flex:1;min-width:0;font:12px var(--mono);color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  #soundPasteBtn,#soundPasteClear{
    flex:0 0 auto;height:34px;border-radius:8px;
    background:var(--cool);color:#062a25;border:1px solid transparent;
    font-size:13px;font-weight:700;
  }
  #soundPasteBtn{padding:0 14px}
  #soundPasteClear{
    width:34px;background:var(--surface2);color:var(--muted);border-color:var(--line);
  }
  #soundPalette{display:flex;gap:6px;overflow-x:auto;margin:0 2px 18px;scrollbar-width:none}
  #soundPalette::-webkit-scrollbar{display:none}
  .soundChip{
    flex:0 0 auto;border-radius:999px;padding:9px 12px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    font-family:var(--mono);font-size:12px;
  }
  #sampleCacheControls{
    display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:6px;
    margin:0 2px 18px;
  }
  #sampleCacheStatus{min-width:0;font-size:12px;color:var(--muted);line-height:1.4}
  #sampleCacheRefresh,#sampleCacheClear{
    height:32px;border-radius:8px;padding:0 8px;font-size:12px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
  }
  #sampleCacheClear{color:var(--warn)}
  #snapSlots{
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;margin:0 2px 18px;
  }
  .snapSlot{
    display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:6px;
    background:var(--surface2);border:1px solid var(--line);border-radius:10px;
    padding:8px;min-width:0;
  }
  .snapMeta{min-width:0}
  .snapName{font-family:var(--mono);font-size:13px;font-weight:700}
  .snapInfo{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .snapSave,.snapLoad{
    height:32px;border-radius:8px;padding:0 8px;font-size:12px;
    background:var(--surface);border:1px solid var(--line);color:var(--text);
  }
  .snapSave{color:var(--cool)}
  .snapLoad:disabled{opacity:.35}
  #songPanel{margin:0 2px 18px}
  #songTitle{
    width:100%;height:42px;border-radius:10px;padding:0 12px;margin-bottom:8px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    font:14px var(--mono);
  }
  #songButtons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  #songSave,#songSaveAs{
    height:40px;border-radius:10px;font-size:13px;font-weight:700;
    border:1px solid var(--line);
  }
  #songSave{background:var(--cool);color:#062a25;border-color:transparent}
  #songSaveAs{background:var(--surface2);color:var(--text)}
  #songUtilityButtons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
  #songExport,#songImport,#songShare{
    height:36px;border-radius:10px;font-size:12px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
  }
  #songImportFile{display:none}
  #songList{display:grid;gap:8px}
  .songRow{
    display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:6px;
    min-width:0;padding:8px;background:var(--surface2);
    border:1px solid var(--line);border-radius:10px;
  }

/* ─────────────────────────────────────

/* ─────────────────────────────────────

const KEYS = [

const STRUDEL_CDN = "https://strudel.b-cdn.net";
/* 本家(strudel.cc)相当のサウンドマップ。目次(JSON)の登録だけで、音声本体は初回使用時に取得される */
const SOUND_MAPS = [
  { kind: "registerZZFXSounds", args: [] },
  { kind: "samples", args: ["github:tidalcycles/dirt-samples"] },
  { kind: "samples", args: [`${STRUDEL_CDN}/piano.json`, `${STRUDEL_CDN}/piano/`, { prebake: true }] },
  { kind: "samples", args: [`${STRUDEL_CDN}/vcsl.json`, `${STRUDEL_CDN}/VCSL/`, { prebake: true }] },
  { kind: "samples", args: [`${STRUDEL_CDN}/tidal-drum-machines.json`, `${STRUDEL_CDN}/tidal-drum-machines/machines/`, { prebake: true, tag: "drum-machines" }] },
  { kind: "samples", args: [`${STRUDEL_CDN}/uzu-drumkit.json`, `${STRUDEL_CDN}/uzu-drumkit/`, { prebake: true, tag: "drum-machines" }] },
  { kind: "samples", args: [`${STRUDEL_CDN}/uzu-wavetables.json`, `${STRUDEL_CDN}/uzu-wavetables/`, { prebake: true }] },
  { kind: "samples", args: [`${STRUDEL_CDN}/mridangam.json`, `${STRUDEL_CDN}/mrid/`, { prebake: true, tag: "drum-machines" }] },

const SOUND_CHIPS = [
  ['s("bd sd hh")',              'bd/sd/hh',     null],
  ['s("bd*4").bank("AkaiLinn")', 'Akai bd',      null],
  ['s("hh*8").bank("RolandTR808")', '808 hat',   null],
  ['note("c4 e4 g4").piano()',   'piano()',      null],
  ['s("mridangam_ta")',          'mridangam',    null],
  ['s("wt_digital").note("c3")', 'wt digital',   null],
];

/* ─────────────────────────────────────
   UI生成
───────────────────────────────────── */
const modesEl = document.getElementById("modes");
const chipsEl = document.getElementById("chips");
let chipMode = CHIP_MODES[0].id;
if (store) {
  const savedMode = store.getItem(MODE_KEY);
  if (CHIP_MODES.some(m => m.id === savedMode)) chipMode = savedMode;
}

function renderChipModes() {
  modesEl.textContent = "";

    const b = document.createElement("button");

}

function setChipMode(modeId) {
  if (!CHIP_MODES.some(m => m.id === modeId)) return;
  chipMode = modeId;
  if (store) { try { store.setItem(MODE_KEY, modeId); } catch (e) {} }

}

function renderChips() {
  chipsEl.textContent = "";

const soundStatusEl = document.getElementById("soundStatus");

const soundFiltersEl = document.getElementById("soundFilters");
const soundResultsEl = document.getElementById("soundResults");
const sampleCacheStatusEl = document.getElementById("sampleCacheStatus");
const sampleCacheRefreshBtn = document.getElementById("sampleCacheRefresh");
const sampleCacheClearBtn = document.getElementById("sampleCacheClear");

async function loadSounds() {
  if (soundsLoaded) return;
  for (const entry of SOUND_MAPS) {
    if (entry.kind === "samples") {
      if (typeof samples !== "function") throw new Error("samples()が見つかりません");
      await samples(...entry.args);
    } else if (entry.kind === "aliasBank") {
      if (typeof aliasBank === "function") await aliasBank(...entry.args);
    } else if (entry.kind === "registerZZFXSounds") {
      if (typeof registerZZFXSounds === "function") await registerZZFXSounds();
    }

}

/* ─────────────────────────────────────
   サウンド検索(soundMapに登録済みの音色名から探す)
───────────────────────────────────── */
const SOUND_FILTERS = [
  { id: "all",   label: "全て",         match: () => true },
  { id: "drum",  label: "ドラムマシン", match: o => o.tag === "drum-machines" },
  { id: "sample",label: "サンプル",     match: o => o.type !== "synth" && o.tag !== "drum-machines" },
  { id: "synth", label: "シンセ",       match: o => o.type === "synth" }
];
const SOUND_RESULT_LIMIT = 60;
let soundFilter = SOUND_FILTERS[0].id;
let soundShownLimit = SOUND_RESULT_LIMIT; // 「さらに読み込む」で60件ずつ増える

function listSounds() {
  if (typeof strudel === "undefined" || !strudel.soundMap) return null;
  const map = strudel.soundMap.get();
  if (!map) return null;
  return Object.keys(map).filter(n => !n.startsWith("_")).sort().map(name => {
    const data = (map[name] && map[name].data) || {};
    const s = data.samples;
    let count = 0;
    if (Array.isArray(s)) count = s.length;
    else if (s && typeof s === "object") count = Object.keys(s).length;
    return { name, type: data.type || "", tag: data.tag || "", count };
  });
}

// 挿入位置が文字列リテラル内なら名前だけ、外なら s("名前") ごと挿入する。
// 単語の途中に落とされたら近い側の境界へ寄せ、文字列内では前後の空白を補う
function insertSoundAt(name, pos) {
  const text = ed.value;
  const isWord = c => !!c && /[A-Za-z0-9_]/.test(c);
  if (isWord(text[pos - 1]) && isWord(text[pos])) {
    let a = pos, b = pos;
    while (isWord(text[a - 1])) a--;
    while (isWord(text[b])) b++;
    pos = (pos - a <= b - pos) ? a : b;
  }
  const quotes = (text.slice(0, pos).match(/"/g) || []).length;
  let ins;
  if (quotes % 2 === 1) {
    ins = name;
    const prev = text[pos - 1], next = text[pos];
    if (prev && !/[\s"([<{,]/.test(prev)) ins = " " + ins;
    if (next && !/[\s")\]>},]/.test(next)) ins = ins + " ";
  } else {
    ins = 's("' + name + '")';
    const prev = text[pos - 1], next = text[pos];
    const touchesCodeBefore = prev && !/[\s([{,]/.test(prev);
    const touchesCodeAfter = next && !/[\s)\]}.,]/.test(next);
    if (touchesCodeBefore || touchesCodeAfter) {
      const lineStart = text.lastIndexOf("\n", Math.max(0, pos - 1)) + 1;
      const lineEndRaw = text.indexOf("\n", pos);
      const lineEnd = lineEndRaw === -1 ? text.length : lineEndRaw;
      const line = text.slice(lineStart, lineEnd);
      const nextLine = lineEndRaw === -1 ? "" : text.slice(lineEnd + 1, text.indexOf("\n", lineEnd + 1) === -1 ? text.length : text.indexOf("\n", lineEnd + 1));
      const indent = ((nextLine || line).match(/^\s*/) || [""])[0];
      pos = line.trim() ? lineEnd : pos;
      const before = text[pos - 1], after = text[pos];
      ins = (before && before !== "\n" ? "\n" + indent : "") +
        ins +
        (after && after !== "\n" ? "\n" + indent : "");
    }
  }
  ed.selectionStart = ed.selectionEnd = pos;
  insertAtCursor(ins, null);
}

/* タップ試聴: スケジューラを通さず単発で鳴らす(再生中のパターンには影響しない) */
function previewSound(name) {
  if (!strudelReady || name === "input") return; // inputはマイク許可を求めるため試聴対象外
  const sd = (typeof strudel !== "undefined" && typeof strudel.superdough === "function")
    ? strudel.superdough : null;
  if (!sd) return;
  try {
    const ctx = getAudioContext();
    if (ctx.state !== "running") {
      const resume = ctx.resume();
      if (resume && resume.catch) resume.catch(() => {});
    }
    // 第2引数はAudioContextの絶対時刻。相対値を渡すと再生後に「過去」扱いで鳴らない
    const r = sd({ s: name, gain: 0.8 }, ctx.currentTime + 0.05, 0.75);
    if (r && r.catch) r.catch(() => {});
  } catch (e) {}
}

/* サウンド操作: タッチ長押しはコピー、マウスはドラッグ挿入 */
const LONG_PRESS_MS = 430;
let swallowNextClick = false;
let soundDrag = null; // {name, ghost, caret, mirror, index, pointerId}

function swallowClickSoon() {
  swallowNextClick = true;
  setTimeout(() => { swallowNextClick = false; }, 600);
}

// 長押し後の指離しで生じるclickがエディタのキャレットを動かすのを防ぐ
document.addEventListener("click", e => {
  if (swallowNextClick) {
    swallowNextClick = false;
    e.preventDefault();
    e.stopPropagation();
  }
}, true);

function makeSoundDragMirror() {
  const cs = getComputedStyle(ed);
  const mirror = document.createElement("div");
  mirror.textContent = ed.value || "\n";
  Object.assign(mirror.style, {
    position: "fixed", zIndex: "68", boxSizing: "border-box",
    font: cs.font, lineHeight: cs.lineHeight, letterSpacing: cs.letterSpacing,
    padding: cs.padding, whiteSpace: "pre-wrap", overflowWrap: "break-word",
    overflow: "auto", color: "transparent", background: "transparent",
    opacity: "0.01", margin: "0", border: "none"
  });
  document.body.appendChild(mirror);
  syncSoundDragMirror(mirror);
  return mirror;
}

function syncSoundDragMirror(mirror) {
  const r = ed.getBoundingClientRect();
  mirror.style.left = r.left + "px";
  mirror.style.top = r.top + "px";
  mirror.style.width = r.width + "px";
  mirror.style.height = r.height + "px";
  mirror.scrollTop = ed.scrollTop;
  mirror.scrollLeft = ed.scrollLeft;
}

function pointInEditor(x, y) {
  const r = ed.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function mirrorIndexFromPoint(mirror, x, y) {
  if (!pointInEditor(x, y)) return null;
  if (!ed.value) return 0;
  let node = null, off = 0;
  if (document.caretRangeFromPoint) {
    const range = document.caretRangeFromPoint(x, y);
    if (!range) return null;
    node = range.startContainer; off = range.startOffset;
  } else if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(x, y);
    if (!pos) return null;
    node = pos.offsetNode; off = pos.offset;
  } else {
    return null;
  }
  if (!mirror.contains(node)) return null;
  if (node.nodeType !== Node.TEXT_NODE) return ed.value.length;
  return Math.min(off, ed.value.length);
}

function placeSoundDropCaret(mirror, caret, index) {
  if (index === null) { caret.style.display = "none"; return; }
  const textNode = mirror.firstChild;
  let rect = null;
  if (textNode && textNode.nodeType === Node.TEXT_NODE) {
    const range = document.createRange();
    const off = Math.min(index, textNode.length);
    range.setStart(textNode, off);
    range.setEnd(textNode, off);
    rect = range.getBoundingClientRect();
  }
  const fs = parseFloat(getComputedStyle(ed).fontSize) || 16;
  const h = fs * 1.55;
  caret.style.display = "";
  if (rect && (rect.top || rect.left)) {
    caret.style.left = rect.left + "px";
    caret.style.top = rect.top + "px";
    caret.style.height = (rect.height || h) + "px";
  } else {
    const er = ed.getBoundingClientRect();
    caret.style.left = (er.left + 14) + "px";
    caret.style.top = (er.top + 14) + "px";
    caret.style.height = h + "px";
  }
}

function startSoundDrag(name, point) {
  if (soundDrag) endSoundDrag(point, true);
  const ghost = document.createElement("div");
  ghost.className = "soundDragGhost";
  ghost.textContent = name;
  const caret = document.createElement("div");
  caret.className = "soundDropCaret";
  document.body.appendChild(ghost);
  document.body.appendChild(caret);
  drawer.classList.add("soundDragging");
  ed.classList.add("soundDropTarget");
  soundDrag = {
    name,
    ghost,
    caret,
    mirror: makeSoundDragMirror(),
    index: null,
    pointerId: point.pointerId
  };
  if (navigator.vibrate) { try { navigator.vibrate(15); } catch (err) {} }
  moveSoundDrag(point);
}

function moveSoundDrag(point) {
  const st = soundDrag;
  if (!st) return;
  st.ghost.style.left = point.clientX + "px";
  st.ghost.style.top = point.clientY + "px";
  syncSoundDragMirror(st.mirror);
  const index = mirrorIndexFromPoint(st.mirror, point.clientX, point.clientY);
  st.index = index;
  st.ghost.classList.toggle("cancel", index === null);
  placeSoundDropCaret(st.mirror, st.caret, index);
}

function endSoundDrag(point, cancelled) {
  const st = soundDrag;
  if (!st) return;
  soundDrag = null;
  st.ghost.remove();
  st.caret.remove();
  st.mirror.remove();
  drawer.classList.remove("soundDragging");
  ed.classList.remove("soundDropTarget");
  swallowClickSoon();
  if (cancelled || st.index === null) {
    drawer.classList.add("show");
    setStatus("ドラッグをキャンセル", playing ? "playing" : "ready");
    return;
  }
  insertSoundAt(st.name, st.index);
  closeDrawer();
  setStatus(st.name + "を挿入", playing ? "playing" : "ready");
}

document.addEventListener("pointermove", e => {
  if (!soundDrag || e.pointerId !== soundDrag.pointerId) return;
  e.preventDefault();
  moveSoundDrag(e);
}, true);
document.addEventListener("pointerup", e => {
  if (!soundDrag || e.pointerId !== soundDrag.pointerId) return;
  e.preventDefault();
  endSoundDrag(e, false);
}, true);
document.addEventListener("pointercancel", e => {
  if (!soundDrag || e.pointerId !== soundDrag.pointerId) return;
  endSoundDrag(e, true);
}, true);
document.addEventListener("touchmove", e => {
  if (soundDrag) e.preventDefault();
}, { capture: true, passive: false });

function bindSoundChip(chip, name) {
  let down = null, longTimer = null;
  chip.addEventListener("contextmenu", e => e.preventDefault()); // Androidの長押しメニュー抑止
  chip.addEventListener("pointerdown", e => {
    e.preventDefault();
    down = {
      x: e.clientX,
      y: e.clientY,
      lastX: e.clientX,
      lastY: e.clientY,
      pointerId: e.pointerId,
      pointerType: e.pointerType
    };
    try { chip.setPointerCapture(e.pointerId); } catch (err) {}
    clearTimeout(longTimer);
    longTimer = setTimeout(() => {
      if (!down) return;
      const point = { clientX: down.lastX, clientY: down.lastY, pointerId: down.pointerId };
      const pointerType = down.pointerType;
      down = null;
      try { chip.releasePointerCapture(point.pointerId); } catch (err) {}
      if (pointerType === "touch" || pointerType === "pen") {
        copySoundForPaste(name);
      } else {
        startSoundDrag(name, point);
      }
    }, LONG_PRESS_MS);
  });
  chip.addEventListener("pointermove", e => {
    if (!down) return;
    down.lastX = e.clientX;
    down.lastY = e.clientY;
    if (Math.abs(e.clientX - down.x) > 8 || Math.abs(e.clientY - down.y) > 8) {
      clearTimeout(longTimer);
      if (down.pointerType === "mouse") {
        const point = { clientX: e.clientX, clientY: e.clientY, pointerId: down.pointerId };
        down = null;
        startSoundDrag(name, point);
      } else {
        down = null; // タッチで動いたらスクロール扱い(長押し不成立)
      }
    }
  });
  chip.addEventListener("pointerup", () => {
    clearTimeout(longTimer);
    if (!down) return;
    down = null;
    previewSound(name); // タップ=試聴
  });
  chip.addEventListener("pointercancel", () => { clearTimeout(longTimer); down = null; });
}

function formatBytes(n) {
  if (!(n > 0)) return "";
  if (n < 1024 * 1024) return Math.max(1, Math.round(n / 1024)) + "KB";
  return (n / 1024 / 1024).toFixed(1) + "MB";
}

async function sampleCacheSize(cache, requests) {
  let total = 0;
  for (const req of requests) {
    const res = await cache.match(req);
    if (!res) continue;
    const len = parseInt(res.headers.get("content-length") || "", 10);
    if (len > 0) { total += len; continue; }
    try { total += (await res.clone().blob()).size; } catch (e) {}
  }
  return total;
}

// manual=true(確認ボタン)のときは時刻とサイズを付けて、押した結果が必ず見えるようにする
async function refreshSampleCacheStatus(manual) {
  if (!("caches" in window)) {
    sampleCacheStatusEl.textContent = "サンプルキャッシュ非対応";
    return;
  }
  if (manual) sampleCacheStatusEl.textContent = "確認中…";
  try {
    const cache = await caches.open(SAMPLE_CACHE_NAME);
    const entries = await cache.keys();
    if (!entries.length) {
      // 初回訪問はService Workerがまだページを制御しておらず、再生してもキャッシュされない
      const sw = navigator.serviceWorker;
      sampleCacheStatusEl.textContent = (sw && !sw.controller)
        ? "キャッシュ準備中(ページ再読み込み後に有効)"
        : "サンプルキャッシュ 0件(再生すると自動保存)";
      return;
    }
    let text = "サンプルキャッシュ " + entries.length + "件";
    if (manual) {
      const size = await sampleCacheSize(cache, entries);
      if (size) text += " / " + formatBytes(size);
      const d = new Date();
      text += " (" +
        String(d.getHours()).padStart(2, "0") + ":" +
        String(d.getMinutes()).padStart(2, "0") + ":" +
        String(d.getSeconds()).padStart(2, "0") + " 時点)";
    }
    sampleCacheStatusEl.textContent = text;
  } catch (e) {
    sampleCacheStatusEl.textContent = "サンプルキャッシュ確認失敗";
  }
}

async function clearSampleCache() {
  if (!("caches" in window)) {
    sampleCacheStatusEl.textContent = "サンプルキャッシュ非対応";
    return;
  }
  try {
    await caches.delete(SAMPLE_CACHE_NAME);
    await refreshSampleCacheStatus();
    setStatus("サンプルキャッシュ削除", playing ? "playing" : "ready");
  } catch (e) {
    sampleCacheStatusEl.textContent = "サンプルキャッシュ削除失敗";
    showError(String(e && e.message ? e.message : e));
  }
}

function openPocketDB() {
  if (!("indexedDB" in window)) return Promise.reject(new Error("IndexedDBが使えません"));
  if (pocketDbPromise) return pocketDbPromise;
  pocketDbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(SONG_STORE)) {
        const store = db.createObjectStore(SONG_STORE, { keyPath: "id" });
        store.createIndex("updatedAt", "updatedAt");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDBを開けません"));
  });
  return pocketDbPromise;
}

function withSongStore(mode, action) {
  return openPocketDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(SONG_STORE, mode);
    const store = tx.objectStore(SONG_STORE);
    let req = null;
    try { req = action(store); } catch (e) { reject(e); return; }
    tx.oncomplete = () => resolve(req ? req.result : undefined);
    tx.onerror = () => reject(tx.error || (req && req.error) || new Error("曲データベースエラー"));
    tx.onabort = () => reject(tx.error || new Error("曲データベース処理を中断しました"));
  }));
}

function getAllSongs() { return withSongStore("readonly", store => store.getAll()); }

function normalizeSongRecord(raw, fallbackId) {
  if (!raw || typeof raw !== "object") return null;
  const code = typeof raw.code === "string" ? raw.code : "";
  if (!code.trim()) return null;
  const now = Date.now();
  const theme = ["", "greenText", "archBtw"].includes(raw.theme) ? raw.theme : "";
  return {
    id: String(raw.id || fallbackId || makeSongId()).slice(0, 90),
    title: String(raw.title || "Untitled").trim().slice(0, 60) || "Untitled",
    code,
    theme,
    snapshots: cleanSnapshots(raw.snapshots),
    createdAt: Number(raw.createdAt) || now,
    updatedAt: Number(raw.updatedAt) || now
  };
}

function encodeBase64Url(text) {
  const bytes = new TextEncoder().encode(text);
  const chunks = [];
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    chunks.push(String.fromCharCode(...bytes.subarray(i, i + chunkSize)));
  }
  const bin = chunks.join("");
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function decodeBase64Url(value) {
  const padded = value.replace(/-/g, "+").replace(/_/g, "/") + "=".repeat((4 - value.length % 4) % 4);
  const bin = atob(padded);
  const bytes = Uint8Array.from(bin, ch => ch.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

function currentSongDraft() {
  return {
    title: (songTitleInput.value.trim() || songTitleFromCode()).slice(0, 60),
    code: ed.value,
    theme: document.documentElement.dataset.theme || "",
    snapshots: cloneSnaps(),

  };
}

function setCurrentSong(id) {
  currentSongId = id || "";
  if (store) {
    try {
      if (currentSongId) store.setItem(CURRENT_SONG_KEY, currentSongId);
      else store.removeItem(CURRENT_SONG_KEY);
    } catch (e) {}
  }
  renderSongList();

function renderSongList(message) {
  songListEl.textContent = "";
  if (message) {
    const empty = document.createElement("div");
    empty.className = "songEmpty";
    empty.textContent = message;
    songListEl.appendChild(empty);
    return;
  }
  if (!songLibrary.length) {
    const empty = document.createElement("div");
    empty.className = "songEmpty";
    empty.textContent = "保存した曲はまだありません";
    songListEl.appendChild(empty);
    return;
  }
  songLibrary.forEach(song => {
    const row = document.createElement("div");
    row.className = "songRow";
    row.classList.toggle("active", song.id === currentSongId);
    row.innerHTML = '<div class="songMeta"><div class="songName"></div><div class="songInfo"></div></div>' +
      '<button class="songLoad">読込</button><button class="songDelete">削除</button>';
    row.querySelector(".songName").textContent = song.title || "Untitled";
    const lines = (song.code || "").split(/\n/).length;
    row.querySelector(".songInfo").textContent = formatSongDate(song.updatedAt) + " / " + lines + "行";
    bindTap(row.querySelector(".songLoad"), () => loadSong(song));
    bindTap(row.querySelector(".songDelete"), () => removeSong(song));
    songListEl.appendChild(row);
  });
}

async function refreshSongList() {
  try {
    songLibrary = (await getAllSongs())
      .filter(song => song && song.id)
      .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    renderSongList();
    if (currentSongId && !songTitleInput.value.trim()) {
      const current = songLibrary.find(song => song.id === currentSongId);
      if (current) songTitleInput.value = current.title || "";
    }
  } catch (e) {
    songLibrary = [];
    renderSongList("この環境では曲保存を使えません");
  }
}

async function saveCurrentSong(asNew) {
  if (!ed.value.trim()) { setStatus("空の曲は保存しません", playing ? "playing" : "ready"); return; }
  try {
    const existing = (!asNew && currentSongId) ? await getSong(currentSongId).catch(() => null) : null;
    const song = {
      id: existing ? existing.id : makeSongId(),
      title: (songTitleInput.value.trim() || songTitleFromCode()).slice(0, 60),
      code: ed.value,
      theme: document.documentElement.dataset.theme || "",
      snapshots: cloneSnaps(),
      createdAt: existing ? (existing.createdAt || Date.now()) : Date.now(),
      updatedAt: Date.now()
    };
    await putSong(song);
    songTitleInput.value = song.title;
    setCurrentSong(song.id);
    await refreshSongList();
    setStatus("曲を保存", playing ? "playing" : "ready");
  } catch (e) {
    setStatus("曲保存失敗", playing ? "playing" : "error");
    showError(String(e && e.message ? e.message : e));
  }
}

async function loadSong(song) {
  if (!song || !song.id) return;
  setCurrentSong(song.id);
  songTitleInput.value = song.title || "";
  ed.value = song.code || "";
  snaps = song.snapshots || {};
  persistSnaps();
  renderSnaps();
  if (song.theme !== undefined) applyTheme(song.theme || "");
  afterEdit();
  updateScrubber();
  closeDrawer();
  ed.focus();
  setStatus("曲を読み込み", playing ? "playing" : "ready");
}

async function removeSong(song) {
  if (!song || !song.id) return;
  if (!confirm("この曲を削除しますか？")) return;
  try {
    await deleteSong(song.id);
    if (song.id === currentSongId) setCurrentSong("");
    await refreshSongList();
    setStatus("曲を削除", playing ? "playing" : "ready");
  } catch (e) {
    setStatus("曲削除失敗", playing ? "playing" : "error");
    showError(String(e && e.message ? e.message : e));
  }
}

async function exportSongs() {
  try {
    const songs = (await getAllSongs()).filter(song => song && song.code);
    if (!songs.length) { setStatus("書き出す曲がありません", playing ? "playing" : "ready"); return; }
    downloadJson({ version: 1, exportedAt: new Date().toISOString(), songs }, exportFileName());
    setStatus(songs.length + "曲を書き出し", playing ? "playing" : "ready");
  } catch (e) {
    setStatus("書き出し失敗", playing ? "playing" : "error");
    showError(String(e && e.message ? e.message : e));
  }
}

async function importSongsFromFile(file) {
  if (!file) return;
  try {
    const payload = JSON.parse(await file.text());
    const imported = normalizeImportedSongs(payload);
    if (!imported.length) { setStatus("読み込める曲がありません", playing ? "playing" : "ready"); return; }
    for (const song of imported) await putSong(song);
    await refreshSongList();
    setStatus(imported.length + "曲を読み込み", playing ? "playing" : "ready");
  } catch (e) {
    setStatus("読み込み失敗", playing ? "playing" : "error");
    showError(String(e && e.message ? e.message : e));
  } finally {
    songImportFile.value = "";
  }
}

async function shareCurrentSong() {
  if (!ed.value.trim()) { setStatus("空の曲はリンク化しません", playing ? "playing" : "ready"); return; }
  let draft, hash, url;
  try {
    draft = currentSongDraft();
    hash = "#song=" + encodeBase64Url(JSON.stringify(draft));
    url = location.origin + location.pathname + hash;
    if (url.length > 8000) throw new Error("共有リンクが長すぎます");
  } catch (e) {
    setStatus("リンク化できません", playing ? "playing" : "error");
    showError("曲が長すぎるため共有リンクにできません。JSON書出を使ってください。");
    return;
  }
  history.replaceState(null, "", hash);
  if (navigator.share) {
    try {
      await navigator.share({ title: draft.title, text: "Strudel Pocket", url });
      setStatus("共有を開きました", playing ? "playing" : "ready");
      return;
    } catch (e) {
      if (e && e.name === "AbortError") return;
    }
  }
  try {
    await navigator.clipboard.writeText(url);
    setStatus("リンクをコピー", playing ? "playing" : "ready");
  } catch (e) {
    setStatus("URLにリンクを反映", playing ? "playing" : "ready");
  }
}

function readSharedSong() {
  if (!location.hash.startsWith("#song=")) return null;
  try {
    return normalizeSongRecord(JSON.parse(decodeBase64Url(location.hash.slice(6))), makeSongId());
  } catch (e) {
    showError("共有リンクを読み込めませんでした");
    return null;
  }
}

/* ─────────────────────────────────────
   タップ判定(キーボードを閉じさせない + スクロールと区別する)
───────────────────────────────────── */
function bindTap(btn, fn) {
  let down = null;
  btn.addEventListener("pointerdown", e => {
    e.preventDefault(); // textareaのフォーカスを奪わない → ソフトキーボードが閉じない
    down = { x: e.clientX, y: e.clientY };
  });
  btn.addEventListener("pointercancel", () => { down = null; }); // スクロール開始で発火
  btn.addEventListener("pointerup", e => {
    if (!down) return;
    const moved = Math.abs(e.clientX - down.x) > 8 || Math.abs(e.clientY - down.y) > 8;
    down = null;
    if (moved) return; // ドラッグ(スクロール)はタップ扱いしない
    e.preventDefault();
    fn();
  });
}

function bindInsert(btn, text, caret) {

}

function insertAtCursor(text, caret) {
  ed.focus();
  const s = ed.selectionStart, e = ed.selectionEnd;
  ed.setRangeText(text, s, e, "end");
  if (caret !== null && caret !== undefined) {
    ed.selectionStart = ed.selectionEnd = s + caret;
  }
  afterEdit();
  updateScrubber();
}

function lineRangeForSelection() {
  const text = ed.value;
  const s = ed.selectionStart, e = ed.selectionEnd;
  const effectiveEnd = e > s && text[e - 1] === "\n" ? e - 1 : e;
  const lineStart = text.lastIndexOf("\n", Math.max(0, s - 1)) + 1;
  const nextBreak = text.indexOf("\n", effectiveEnd);
  const lineEnd = nextBreak === -1 ? text.length : nextBreak;
  return { lineStart, lineEnd, hasSelection: e !== s };
}

function toggleLineComment() {
  ed.focus();
  const text = ed.value;
  const s = ed.selectionStart, e = ed.selectionEnd;
  const { lineStart, lineEnd, hasSelection } = lineRangeForSelection();
  const block = text.slice(lineStart, lineEnd);
  if (!block) return;
  const lines = block.split("\n");
  const filled = lines.filter(line => line.trim());
  const uncomment = filled.length > 0 && filled.every(line => /^\s*\/\//.test(line));
  const newLines = lines.map(line => {
    if (!line.trim()) return line;
    if (uncomment) return line.replace(/^(\s*)\/\//, "$1");
    return line.replace(/^(\s*)/, "$1//");
  });
  const newBlock = newLines.join("\n");
  ed.setRangeText(newBlock, lineStart, lineEnd, "select");
  if (hasSelection) {
    ed.selectionStart = lineStart;
    ed.selectionEnd = lineStart + newBlock.length;
  } else {
    const oldLine = block;
    const indent = (oldLine.match(/^\s*/) || [""])[0].length;
    const pivot = lineStart + indent;
    const delta = uncomment ? -2 : 2;
    const next = s > pivot ? s + delta : s;
    ed.selectionStart = ed.selectionEnd = Math.max(lineStart, Math.min(ed.value.length, next));
  }
  afterEdit();
  updateScrubber();
}

function indentSelection(direction) {
  ed.focus();
  const text = ed.value;
  const s = ed.selectionStart, e = ed.selectionEnd;
  if (s === e && direction > 0) {
    insertAtCursor("  ", null);
    return;
  }
  const effectiveEnd = e > s && text[e - 1] === "\n" ? e - 1 : e;
  const lineStart = text.lastIndexOf("\n", Math.max(0, s - 1)) + 1;
  const nextBreak = text.indexOf("\n", effectiveEnd);
  const lineEnd = nextBreak === -1 ? text.length : nextBreak;
  const lines = text.slice(lineStart, lineEnd).split("\n");
  let startDelta = 0, endDelta = 0;
  const nextLines = lines.map((line, index) => {
    if (direction > 0) {
      if (lineStart + lines.slice(0, index).join("\n").length + (index ? 1 : 0) <= s) startDelta += 2;
      endDelta += 2;
      return "  " + line;
    }
    if (line.startsWith("  ")) {
      if (lineStart + lines.slice(0, index).join("\n").length + (index ? 1 : 0) < s) startDelta -= 2;
      endDelta -= 2;
      return line.slice(2);
    }
    if (line.startsWith(" ")) {
      if (lineStart + lines.slice(0, index).join("\n").length + (index ? 1 : 0) < s) startDelta -= 1;
      endDelta -= 1;
      return line.slice(1);
    }
    return line;
  });
  const nextBlock = nextLines.join("\n");
  ed.setRangeText(nextBlock, lineStart, lineEnd, "select");
  ed.selectionStart = Math.max(lineStart, s + startDelta);
  ed.selectionEnd = Math.max(ed.selectionStart, e + endDelta);
  afterEdit();
  updateScrubber();
}

function autoIndentNewline() {
  const s = ed.selectionStart;
  const lineStart = ed.value.lastIndexOf("\n", Math.max(0, s - 1)) + 1;
  const line = ed.value.slice(lineStart, s);
  const indent = (line.match(/^\s*/) || [""])[0];
  insertAtCursor("\n" + indent + "  ", null);
}

function autoPairQuote() {
  const s = ed.selectionStart, e = ed.selectionEnd;
  const next = ed.value[e];
  if (s !== e) {
    const selected = ed.value.slice(s, e);
    ed.setRangeText('"' + selected + '"', s, e, "end");
    ed.selectionStart = s + 1;
    ed.selectionEnd = e + 1;
    afterEdit();
    updateScrubber();
    return;
  }
  if (next === '"') {
    ed.selectionStart = ed.selectionEnd = e + 1;
    updateScrubber();
    return;
  }
  insertAtCursor('""', 1);
}

ed.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "/") {
    e.preventDefault();
    toggleLineComment();
    return;
  }
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === "Tab") {
    e.preventDefault();
    indentSelection(e.shiftKey ? -1 : 1);
  } else if (e.key === "Enter") {
    e.preventDefault();
    autoIndentNewline();
  } else if (e.key === '"') {
    e.preventDefault();
    autoPairQuote();
  }
});

function formatCpmFromBpm(value) {
  return String(parseFloat((value / 4).toFixed(2)));
}

function readBpmFromCode() {
  const m = ed.value.match(/setcpm\(\s*([0-9]+(?:\.[0-9]+)?)\s*\)/);
  if (!m) return null;
  const value = Math.round(parseFloat(m[1]) * 4);
  return Number.isFinite(value) ? Math.max(40, Math.min(220, value)) : null;
}

function updateBpmControls(value) {
  bpm = Math.max(40, Math.min(220, Math.round(value)));
  bpmSlider.value = String(bpm);
  bpmValueEl.textContent = String(bpm);
  if (store) { try { store.setItem(BPM_KEY, String(bpm)); } catch (e) {} }
  if (playing && activeNoteTimer) startActiveNoteOverlay();
}

function applyBpmToCode() {
  const line = "setcpm(" + formatCpmFromBpm(bpm) + ")";
  const text = ed.value;
  const s = ed.selectionStart, e = ed.selectionEnd;
  const re = /^(\s*)setcpm\(\s*[0-9]+(?:\.[0-9]+)?\s*\)/m;
  const m = text.match(re);
  if (m) {
    const start = m.index || 0;
    const next = text.slice(0, start) + m[1] + line + text.slice(start + m[0].length);
    const delta = next.length - text.length;
    ed.value = next;
    if (s >= start + m[0].length) {
      ed.selectionStart = s + delta;
      ed.selectionEnd = e + delta;
    } else {
      ed.selectionStart = s;
      ed.selectionEnd = e;
    }
  } else {
    const prefix = line + (text.trim() ? "\n" : "");
    ed.value = prefix + text;
    ed.selectionStart = s + prefix.length;
    ed.selectionEnd = e + prefix.length;
  }
  afterEdit();
  updateScrubber();
}

function syncBpmFromCode() {
  updateBpmControls(readBpmFromCode() || bpm);
}

/* ─────────────────────────────────────
   編集履歴(スマホではOSキーボードのundoが使いにくいため独自に持つ)
───────────────────────────────────── */
const undoBtn = document.getElementById("undoBtn");
const redoBtn = document.getElementById("redoBtn");
const hist = [];
let histIdx = -1, histTimer = null, applyingHist = false;

function flushHistory() {
  clearTimeout(histTimer);
  if (hist[histIdx] === ed.value) return;
  hist.splice(histIdx + 1);           // redo側を捨てる
  hist.push(ed.value);
  if (hist.length > 100) hist.shift(); // 上限
  histIdx = hist.length - 1;
  updateHistBtns();
}
function recordHistory() {
  if (applyingHist) return;
  clearTimeout(histTimer);
  histTimer = setTimeout(flushHistory, 400); // 連続入力は1エントリにまとめる
}
function applyHistory(d) {
  flushHistory(); // 保留中の変更を先に確定してから移動
  const i = histIdx + d;
  if (i < 0 || i >= hist.length) return;
  histIdx = i;
  applyingHist = true;
  ed.value = hist[i];
  afterEdit();
  applyingHist = false;
  updateHistBtns();
}
function updateHistBtns() {
  undoBtn.disabled = histIdx <= 0;
  redoBtn.disabled = histIdx >= hist.length - 1;
}

/* カーソル移動(textarea内のタップ位置調整はスマホだと難しいため) */
function moveCaret(d) {
  ed.focus();
  const hasSel = ed.selectionStart !== ed.selectionEnd;
  let p = d < 0 ? ed.selectionStart : ed.selectionEnd;
  if (!hasSel) p += d; // 選択中は選択の端に畳むだけ(標準的な挙動)
  p = Math.max(0, Math.min(ed.value.length, p));
  ed.selectionStart = ed.selectionEnd = p;
  updateScrubber();
}

document.getElementById("caretL").addEventListener("pointerdown", e => {

});
document.getElementById("caretR").addEventListener("pointerdown", e => {

// ヘッダーの#hscroll内にあるためスワイプ(A−/A＋を出す操作)と区別する

// PCでは縦ホイールでも#hscrollを横に送れるようにする
document.getElementById("hscroll").addEventListener("wheel", e => {

  e.currentTarget.scrollLeft += e.deltaY + e.deltaX;
}, { passive: false });

/* ─────────────────────────────────────
   数値フェーダー
───────────────────────────────────── */
function numberAtCaret() {
  if (document.activeElement !== ed) return null;
  if (ed.selectionStart !== ed.selectionEnd) {
    // 選択中も選択範囲の先頭で判定
  }
  const pos = ed.selectionStart;
  const text = ed.value;
  const isNumChar = c => c >= "0" && c <= "9" || c === ".";
  let a = pos, b = pos;
  while (a > 0 && isNumChar(text[a - 1])) a--;
  while (b < text.length && isNumChar(text[b])) b++;
  if (a === b) return null;
  const raw = text.slice(a, b);
  if (!/^(\d+\.?\d*|\.\d+)$/.test(raw)) return null;
  // 直前が英字なら識別子の一部(例: lpf2という変数名)なので無視
  if (a > 0 && /[A-Za-z_$]/.test(text[a - 1])) return null;
  return { start: a, end: b, raw, value: parseFloat(raw), hasDot: raw.includes(".") };
}

function scrubConf(t) {
  const v = t.value;
  if (t.hasDot || v <= 2) {
    return { min: 0, max: Math.max(1, Math.ceil(v * 2 * 10) / 10), step: 0.1, dec: 1 };
  }
  if (v <= 64) return { min: 0, max: Math.max(16, v * 2), step: 1, dec: 0 };
  return { min: 0, max: v * 2, step: v >= 1000 ? 50 : 10, dec: 0 };
}

function fmtNum(v, dec) {
  return String(parseFloat(v.toFixed(dec)));
}

let conf = null;
let faderActive = false; // ドラッグ中はレンジを再計算しない
function updateScrubber() {
  if (scrubbing || faderActive) return;
  const active = document.activeElement;
  if (active && scrub.contains(active)) return; // フェーダー操作中は維持
  const t = numberAtCaret();
  if (!t) {
    scrub.classList.remove("show");
    tok = null;
    scheduleViewportLayout();
    return;
  }
  // すでにフェーダーが掴んでいるのと同じ数値なら、レンジ(min/max/step)は据え置く。
  // 値を書き換えるたびにmaxがv*2へ再拡張されて値が際限なく伸びるのを防ぐ。
  if (tok && conf && t.start === tok.start && scrub.classList.contains("show")) {
    tok = t;
    return;
  }
  tok = t;
  conf = scrubConf(t);
  fader.min = conf.min;
  fader.max = conf.max;
  fader.step = conf.step;
  fader.value = t.value;
  scrubVal.textContent = t.raw;
  scrub.classList.add("show");
  scheduleViewportLayout();
}

function applyScrubValue(v) {
  if (!tok) return;
  v = Math.max(0, v);
  const str = fmtNum(v, conf.dec);
  scrubbing = true;
  ed.setRangeText(str, tok.start, tok.end, "select");
  scrubbing = false;
  tok.end = tok.start + str.length;
  tok.value = parseFloat(str);
  tok.raw = str;
  scrubVal.textContent = str;
  afterEdit();
}

fader.addEventListener("input", () => applyScrubValue(parseFloat(fader.value)));
fader.addEventListener("pointerdown", () => { faderActive = true; });
window.addEventListener("pointerup", () => { faderActive = false; });
window.addEventListener("pointercancel", () => { faderActive = false; });

document.getElementById("stepMinus").addEventListener("pointerdown", e => {
  e.preventDefault();
  if (!tok) return;
  const v = Math.max(0, tok.value - parseFloat(fader.step));
  if (v <= parseFloat(fader.min)) fader.min = 0;
  fader.value = v;
  applyScrubValue(v);
});
document.getElementById("stepPlus").addEventListener("pointerdown", e => {
  e.preventDefault();
  if (!tok) return;
  const v = tok.value + parseFloat(fader.step);
  if (v >= parseFloat(fader.max)) fader.max = v * 2; // 上限に当たったら伸ばす
  fader.value = v;
  applyScrubValue(v);

document.addEventListener("selectionchange", () => {

/* ─────────────────────────────────────
   Strudel 初期化・再生
───────────────────────────────────── */
function setStatus(text, dotClass) {

}

const libScript = document.getElementById("strudel-lib");

if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

let evalSeq = 0;              // 停止・再評価のたびに進める世代番号
let wantPlaying = false;      // ユーザーが望んでいる状態(true=再生)
let evalChain = Promise.resolve(); // evaluateを直列化し、完了順の入れ替わりを防ぐ

// 再生/停止トグルの見た目を切り替える
function setTransport(on) {
  playBtn.textContent = on ? "■" : "▶";
  playBtn.classList.toggle("playing", on);
  playBtn.setAttribute("aria-label", on ? "停止" : "再生");
}

// グローバルのhushはreplスコープ用の別物(silenceを返すだけでスケジューラを止めない)。
// 本当に停止するのはUMD名前空間側の strudel.hush (= scheduler.stop)。
function hardHush() {
  if (typeof strudel === "undefined" || typeof strudel.hush !== "function") {
    showError("strudel.hush()が見つかりません(Strudel未初期化の可能性)");
    return;
  }
  strudel.hush();
}

// 視覚化(.pianoroll()等)の描き残しを消す。キャンバスはStrudelが遅延生成する
function clearVisual() {
  const c = document.getElementById("test-canvas");
  if (c) {
    const x = c.getContext("2d");
    if (x) x.clearRect(0, 0, c.width, c.height);
  }
}
// 停止直後は描画ループが最終フレームを描くことがあるため、クリアではなく非表示で確実に消す
function setVisualVisible(on) {
  const c = document.getElementById("test-canvas");
  if (c) c.style.visibility = on ? "" : "hidden";
}

/* ─────────────────────────────────────
   視覚化(.pianoroll()/.scope()等)をコード下の専用エリアへ
   Patternメソッドをラップし、描画先ctxを自前キャンバスに差し替える
───────────────────────────────────── */
const visualsEl = document.getElementById("visuals");
const visPool = [];  // 生成済みキャンバス(評価をまたいで再利用)
let visCount = 0;    // 今回の評価で割り当てた数
let activeNoteTimer = null;
let activeNoteStep = 0;

function themeColor(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function themedVisualOptions(opts = {}) {
  const cool = themeColor("--cool");
  const hot = themeColor("--hot");
  const bg = themeColor("--bg");
  return {
    active: cool,
    inactive: cool,
    playheadColor: cool,
    activeColor: cool,
    inactiveColor: cool,
    color: cool,
    stroke: cool,
    strokeStyle: cool,
    lineColor: cool,
    waveColor: cool,
    fill: hot,
    fillStyle: hot,
    background: bg,
    backgroundColor: bg,
    ...opts
  };
}

function hasOwnOption(opts, key) {
  return Object.prototype.hasOwnProperty.call(opts, key);
}

function parseRgbColor(value) {
  if (typeof value !== "string") return null;
  const text = value.trim().toLowerCase();
  const hex = text.match(/^#([0-9a-f]{3,4}|[0-9a-f]{6}|[0-9a-f]{8})$/);
  if (hex) {
    const color = hex[1].length === 4 ? hex[1].slice(0, 3) :
      hex[1].length === 8 ? hex[1].slice(0, 6) : hex[1];
    const raw = color.length === 3
      ? color.split("").map(ch => ch + ch).join("")
      : color;
    return {
      r: parseInt(raw.slice(0, 2), 16),
      g: parseInt(raw.slice(2, 4), 16),
      b: parseInt(raw.slice(4, 6), 16)
    };
  }
  const rgb = text.match(/^rgba?\(\s*(\d+(?:\.\d+)?)\s*(?:,|\s)\s*(\d+(?:\.\d+)?)\s*(?:,|\s)\s*(\d+(?:\.\d+)?)/);
  if (rgb) {
    return {
      r: Number(rgb[1]),
      g: Number(rgb[2]),
      b: Number(rgb[3])
    };
  }
  return null;
}

function isStrudelDefaultVisualColor(value) {
  const parts = parseRgbColor(value);
  if (!parts) return false;
  // @strudel/web 1.3.0 の内部テーマ foreground。広い青判定にすると .color("cyan") などの作曲者指定色まで潰れる。
  return parts.r === 117 && parts.g === 186 && parts.b === 255;
}

function themedCanvasContext(ctx, { rewriteDefaultColors = false } = {}) {
  if (!rewriteDefaultColors) return ctx;
  return new Proxy(ctx, {
    get(target, prop) {
      const value = target[prop];
      return typeof value === "function" ? value.bind(target) : value;
    },
    set(target, prop, value) {
      if ((prop === "strokeStyle" || prop === "fillStyle") && isStrudelDefaultVisualColor(value)) {
        target[prop] = themeColor("--cool");
        return true;
      }
      target[prop] = value;
      return true;
    }
  });
}

function themedMutableVisualOptions(opts, forced = {}) {
  const explicitColor = hasOwnOption(opts, "color");
  const visualOpts = { ...themedVisualOptions(opts), ...forced };
  return new Proxy(visualOpts, {
    set(target, prop, value) {
      if (prop === "color" && isStrudelDefaultVisualColor(value)) {
        if (!explicitColor) target[prop] = themeColor("--cool");
        return true;
      }
      target[prop] = value;
      return true;
    }
  });
}

function allocVisualCanvas(options = {}) {
  let c = visPool[visCount];
  if (!c) {
    c = document.createElement("canvas");
    visualsEl.appendChild(c);
    visPool.push(c);
  }
  c.dataset.theme = document.documentElement.dataset.theme || "pocket";
  visCount++;
  visualsEl.classList.add("show"); // 評価中に呼ばれるため即表示してサイズ確定
  scheduleViewportLayout();
  layoutVisualCanvases();
  return themedCanvasContext(c.getContext("2d"), options);
}

function layoutVisualCanvases() {
  const dpr = window.devicePixelRatio || 1;
  visPool.forEach(c => {
    const r = c.getBoundingClientRect();
    const w = Math.round(r.width * dpr), h = Math.round(r.height * dpr);
    if (w && h && (c.width !== w || c.height !== h)) { c.width = w; c.height = h; }
  });
}
window.addEventListener("resize", () => setTimeout(layoutVisualCanvases, 250));

function collectActiveNoteRanges() {
  const ranges = [];
  const text = ed.value;
  const callRe = /\b(?:s|note|n)\(\s*"([^"]*)"/g;
  let call;
  while ((call = callRe.exec(text))) {
    const quoteOffset = call[0].indexOf('"') + 1;
    const base = call.index + quoteOffset;
    const tokenRe = /[A-Za-z0-9_#:+.-]+/g;
    let token;
    while ((token = tokenRe.exec(call[1]))) {
      ranges.push({ start: base + token.index, end: base + token.index + token[0].length });
    }
  }
  return ranges;
}

function makeEditorRectMirror() {
  const cs = getComputedStyle(ed);
  const mirror = document.createElement("div");
  mirror.setAttribute("aria-hidden", "true");
  mirror.textContent = ed.value || "\n";
  const r = ed.getBoundingClientRect();
  Object.assign(mirror.style, {
    position: "fixed", left: r.left + "px", top: r.top + "px",
    width: r.width + "px", height: r.height + "px", zIndex: "-1",
    boxSizing: "border-box", font: cs.font, lineHeight: cs.lineHeight,
    letterSpacing: cs.letterSpacing, padding: cs.padding, border: "none",
    whiteSpace: "pre-wrap", overflowWrap: "break-word", overflow: "auto",
    pointerEvents: "none",
    color: "transparent", background: "transparent", opacity: "0.01"
  });
  mirror.scrollTop = ed.scrollTop;
  mirror.scrollLeft = ed.scrollLeft;
  document.body.appendChild(mirror);
  return mirror;
}

function drawActiveNoteOverlay() {
  activeNoteOverlay.textContent = "";
  if (!playing || document.activeElement !== ed && !ed.value) return;
  const ranges = collectActiveNoteRanges();
  if (!ranges.length) return;
  const target = ranges[activeNoteStep % ranges.length];
  activeNoteStep++;
  const mirror = makeEditorRectMirror();
  const node = mirror.firstChild;
  const er = ed.getBoundingClientRect();
  if (node && node.nodeType === Node.TEXT_NODE) {
    const range = document.createRange();
    range.setStart(node, Math.min(target.start, node.length));
    range.setEnd(node, Math.min(target.end, node.length));
    Array.from(range.getClientRects()).forEach(rect => {
      if (rect.bottom < er.top || rect.top > er.bottom || rect.right < er.left || rect.left > er.right) return;
      const box = document.createElement("div");
      box.className = "activeNoteBox";
      box.style.left = Math.max(rect.left, er.left) + "px";
      box.style.top = Math.max(rect.top, er.top) + "px";
      box.style.width = Math.max(8, Math.min(rect.right, er.right) - Math.max(rect.left, er.left)) + "px";
      box.style.height = Math.max(16, rect.height) + "px";
      activeNoteOverlay.appendChild(box);
    });
  }
  mirror.remove();
}

function startActiveNoteOverlay() {
  stopActiveNoteOverlay();
  activeNoteStep = 0;
  drawActiveNoteOverlay();
  activeNoteTimer = setInterval(drawActiveNoteOverlay, Math.max(180, Math.min(520, 30000 / bpm)));
}

function stopActiveNoteOverlay() {
  if (activeNoteTimer) clearInterval(activeNoteTimer);
  activeNoteTimer = null;
  activeNoteOverlay.textContent = "";
}

function finishVisuals() {
  while (visPool.length > visCount) visPool.pop().remove(); // 使われなかった余りを撤去
  const has = visPool.length > 0;
  visualsEl.classList.toggle("show", has);
  ed.classList.toggle("withVisuals", has);
  scheduleViewportLayout();
  layoutVisualCanvases();
}

let visualsPatched = false;
function patchVisuals() {
  if (visualsPatched || typeof strudel === "undefined" || !strudel.Pattern) return;
  visualsPatched = true;
  const P = strudel.Pattern.prototype;
  // pianoroll: ctxの差し替えだけでよい(描画は本体の共通ループが回す)
  const origRoll = P.pianoroll;
  P.pianoroll = function (opts = {}) {
    const ctx = allocVisualCanvas({ rewriteDefaultColors: !hasOwnOption(opts, "color") });
    return origRoll.call(this, { ...themedVisualOptions(opts), ctx });
  };
  // scope系: ctxに加えて id(アナライザ+描画ループのキー)を自動採番し、
  // 複数表示や本体ループ(id:1)との衝突を避ける。ユーザー指定があればそちらが勝つ
  ["scope", "tscope", "fscope", "spectrum"].forEach(name => {
    const orig = P[name];
    if (!orig) return;
    P[name] = function (opts = {}) {
      const ctx = allocVisualCanvas({ rewriteDefaultColors: !hasOwnOption(opts, "color") });
      const id = opts.id !== undefined ? opts.id : 1 + visCount;
      const visualOpts = themedMutableVisualOptions(opts, { id, ctx });
      return orig.call(this, visualOpts);
    };
  });
}

async function runEval() {
  clearTimeout(evalTimer);
  if (!strudelReady) return;
  // pointerdown+preventDefaultだとclickイベントが発火せず、Strudelの
  // 自動アンロック(クリック時のresume)が効かないことがあるため明示的にresumeする
  try {
    const ctx = getAudioContext();
    if (ctx.state !== "running") ctx.resume();
  } catch (e) {}
  const code = ed.value.trim();
  if (!code) { showError("コードが空です"); return; }
  const mySeq = ++evalSeq;
  wantPlaying = true;
  setTransport(true); // 評価中から■にして、すぐ停止操作できるようにする
  setStatus("評価中…", "playing");
  evalChain = evalChain.then(async () => {
    if (mySeq !== evalSeq) return; // 追い越された/停止された要求は評価自体をスキップ
    try {
      visCount = 0; // 視覚化キャンバスの割り当てを巻き戻す(評価中に再割り当てされる)
      await evaluate(code);
      if (mySeq !== evalSeq) {
        // 評価中に停止された場合のみ黙らせる(新しい評価が控えている場合は触らない)
        if (!wantPlaying) { try { hardHush(); } catch (e) {} }
        return;
      }
      clearVisual(); // 視覚化を外した場合の描き残し対策(使用中なら次フレームで再描画される)
      setVisualVisible(true);
      finishVisuals();
      playing = true;
      clearError();
      setStatus("再生中", "playing");
      setTransport(true);
      startActiveNoteOverlay();
      acquireWakeLock();
    } catch (e) {
      if (mySeq !== evalSeq) return;
      if (!playing) { wantPlaying = false; setTransport(false); } // 鳴っていないなら▶に戻す
      setStatus(playing ? "再生中(直前のエラーあり)" : "エラー", playing ? "playing" : "error");
      showError(String(e && e.message ? e.message : e));
    }
  });
}

function stopAll(statusText) {
  clearTimeout(evalTimer); // 予約済みの再評価をキャンセル
  evalSeq++;               // 実行中(await中)のevaluateも無効化
  wantPlaying = false;
  try { hardHush(); } catch (e) {
    showError("停止エラー: " + (e && e.message ? e.message : e));
  }
  // 停止直後に完了した評価の取りこぼし対策。ただし再生要求が出ていれば撃たない
  setTimeout(() => {
    if (!wantPlaying) { try { hardHush(); } catch (e) {} }
  }, 400);
  playing = false;
  setStatus(statusText || "停止", "ready");
  setTransport(false);
  releaseWakeLock();
  setVisualVisible(false);
  stopActiveNoteOverlay();
  setTimeout(clearVisual, 300); // 最終フレームの描画が終わった頃に中身も消しておく
}

playBtn.addEventListener("pointerdown", e => {
  e.preventDefault(); // キーボードを維持したまま操作
  if (wantPlaying) stopAll(); else runEval();
});

/* PC向けキーボードショートカット(本家準拠: Ctrl+Enter=再生/更新, Ctrl+.=停止) */
document.addEventListener("keydown", e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  if (e.key === "Enter") { e.preventDefault(); runEval(); }
  else if (e.key === "." || e.code === "Period") { e.preventDefault(); stopAll(); }
});

/* 画面スリープ防止 */
async function acquireWakeLock() {
  try {
    if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen");
  } catch (e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden" && (playing || wantPlaying) && !backgroundPlayEnabled) {
    stopAll("非アクティブで停止");
  } else if (document.visibilityState === "visible" && playing) {
    acquireWakeLock();
  }
});

/* ─────────────────────────────────────
   ソフトキーボードの直上にドックを固定
───────────────────────────────────── */
let viewportLayoutFrame = 0;

function scheduleViewportLayout() {
  if (viewportLayoutFrame) return;
  viewportLayoutFrame = requestAnimationFrame(() => {
    viewportLayoutFrame = 0;
    layoutDock();
  });
}

function layoutDock() {
  const vv = window.visualViewport;
  const offset = vv ? window.innerHeight - vv.height - vv.offsetTop : 0;
  const keyboardInset = Math.max(0, Math.round(offset));
  document.documentElement.style.setProperty("--keyboard-inset", keyboardInset + "px");
  syncDockHeight();
  dock.style.transform = "translate3d(0," + (-keyboardInset) + "px,0)";
}
if ("ResizeObserver" in window) {
  new ResizeObserver(scheduleViewportLayout).observe(dock);
}
if (window.visualViewport) {
  visualViewport.addEventListener("resize", layoutDock);
  visualViewport.addEventListener("scroll", layoutDock);
}
layoutDock();

/* ─────────────────────────────────────
   ドロワー・フォントサイズ・初期値
───────────────────────────────────── */
const drawer = document.getElementById("drawer");
const sheet = document.getElementById("sheet");
const sheetHead = document.getElementById("sheetHead");
const sheetBody = document.getElementById("sheetBody");
const sheetTabBtns = [...document.querySelectorAll(".sheetTab")];
const drawerSecs = [...document.querySelectorAll(".dsec")];

let drawerTab = "patterns";
if (store) {
  const savedTab = store.getItem(DRAWER_TAB_KEY);
  if (drawerSecs.some(s => s.dataset.sec === savedTab)) drawerTab = savedTab;
}

function setDrawerTab(sec) {
  if (!drawerSecs.some(s => s.dataset.sec === sec)) return;
  drawerTab = sec;
  if (store) { try { store.setItem(DRAWER_TAB_KEY, sec); } catch (e) {} }
  sheetTabBtns.forEach(b => b.classList.toggle("active", b.dataset.sec === sec));
  drawerSecs.forEach(s => s.classList.toggle("show", s.dataset.sec === sec));
  if (sec === "sound") renderSoundResults();
  sheetBody.scrollTop = 0;
}
sheetTabBtns.forEach(b => b.addEventListener("click", () => setDrawerTab(b.dataset.sec)));
setDrawerTab(drawerTab);

function openDrawer() {
  drawer.classList.add("show");
  refreshSampleCacheStatus(); // 開いた時点のキャッシュ状態に更新(古い件数を出しっぱなしにしない)
}
function closeDrawer() { drawer.classList.remove("show"); }
document.getElementById("openDrawer").addEventListener("click", openDrawer);
document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
drawer.addEventListener("click", e => { if (e.target === drawer) closeDrawer(); });

/* シート上部(つまみ)を下にスワイプで閉じる。タブボタン上は誤爆防止で対象外 */
let sheetDragY = null;
sheetHead.addEventListener("pointerdown", e => {
  if (e.target.closest("button")) return;
  sheetDragY = e.clientY;
  try { sheetHead.setPointerCapture(e.pointerId); } catch (err) {}
});
sheetHead.addEventListener("pointermove", e => {
  if (sheetDragY === null) return;
  sheet.style.transform = "translateY(" + Math.max(0, e.clientY - sheetDragY) + "px)";
});
function endSheetDrag(e) {
  if (sheetDragY === null) return;
  const dy = e.clientY - sheetDragY;
  sheetDragY = null;
  sheet.style.transform = "";
  if (dy > 70) closeDrawer();
}
sheetHead.addEventListener("pointerup", endSheetDrag);
sheetHead.addEventListener("pointercancel", endSheetDrag);

document.getElementById("clearBtn").addEventListener("click", () => {
  ed.value = "";
  afterEdit();
  closeDrawer();
});

/* テーマ切替 */
const themeBtns = [...document.querySelectorAll(".themeBtn")];
function applyTheme(name) {
  if (name) document.documentElement.dataset.theme = name;
  else delete document.documentElement.dataset.theme;
  themeBtns.forEach(b => b.classList.toggle("active", (b.dataset.theme || "") === (name || "")));
  const bg = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim();
  document.querySelector('meta[name="theme-color"]').setAttribute("content", bg);
  if (store) { try { store.setItem(THEME_KEY, name || ""); } catch (e) {} }
}
themeBtns.forEach(b => b.addEventListener("click", () => applyTheme(b.dataset.theme)));
applyTheme(store ? (store.getItem(THEME_KEY) || "") : "");

let fontSize = 16;
if (store) {
  const f = parseInt(store.getItem(FONT_KEY) || "16", 10);
  if (f >= 16 && f <= 24) fontSize = f;
}
function applyFont() {
  ed.style.fontSize = fontSize + "px";
  if (store) { try { store.setItem(FONT_KEY, String(fontSize)); } catch (e) {} }
}
bindTap(document.getElementById("fontMinus"), () => {
  fontSize = Math.max(16, fontSize - 1); applyFont(); // 16px未満はiOSが自動ズームするため下限16
});
bindTap(document.getElementById("fontPlus"), () => {
  fontSize = Math.min(24, fontSize + 1); applyFont();
});
applyFont();

/* 起動時: 共有リンク、保存済みコード、デモの順で復元 */
const sharedSong = readSharedSong();
let initial = null;
if (store) { try { initial = store.getItem(SAVE_KEY); } catch (e) {} }
if (sharedSong) {
  setCurrentSong("");
  songTitleInput.value = sharedSong.title || "";
  snaps = cleanSnapshots(sharedSong.snapshots);
  persistSnaps();
  renderSnaps();
  applyTheme(sharedSong.theme || "");
  ed.value = sharedSong.code;
  if (store) { try { store.setItem(SAVE_KEY, ed.value); } catch (e) {} }
  history.replaceState(null, "", location.pathname + location.search);
} else {
  ed.value = (initial && initial.trim()) ? initial : PRESETS[4].code;
}
syncBpmFromCode();
hist.push(ed.value); histIdx = 0; updateHistBtns(); // 履歴の起点
</script>
</body>
</html>
